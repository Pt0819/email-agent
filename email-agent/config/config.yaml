# Agent配置
server:
  host: "0.0.0.0"
  port: 9111

# Redis配置
redis:
  host: "localhost"
  port: 6379
  db: 0

# ChromaDB配置
chroma:
  host: "localhost"
  port: 8000
  collection_name: "emails"

# LLM配置
llm:
  default_provider: "zhipu"  # 默认使用智谱GLM（有免费额度）

  providers:
    zhipu:
      enabled: true
      api_key: "${ZHIPU_API_KEY}"  # 智谱API Key（免费模型有额度限制）
      model: "glm-4-flash"  # 免费模型
      temperature: 0.3
      max_tokens: 4096
      base_url: "https://open.bigmodel.cn/api/paas/v4"

    deepseek:
      enabled: false
      api_key: "${DEEPSEEK_API_KEY}"
      model: "deepseek-chat"
      temperature: 0.3
      max_tokens: 4096
      base_url: "https://api.deepseek.com/v1"

    # Mock Provider - 用于测试，无需API Key
    mock:
      enabled: true
      model: "mock-llm"
      temperature: 0.3
      max_tokens: 4096

# 分类配置
classification:
  auto_classify: true
  # 正则预筛选开关（开启后优先使用正则匹配，减少LLM调用）
  use_regex_pre_filter: true
  # 正则匹配置信度阈值（达到此值直接返回，不再调用LLM）
  regex_confidence_threshold: 0.85
  categories:
    - code: "work_urgent"
      name: "紧急工作"
      priority: "critical"
    - code: "work_normal"
      name: "普通工作"
      priority: "medium"
    - code: "personal"
      name: "个人邮件"
      priority: "medium"
    - code: "subscription"
      name: "订阅邮件"
      priority: "low"
    - code: "notification"
      name: "系统通知"
      priority: "low"
    - code: "promotion"
      name: "营销推广"
      priority: "low"
    - code: "spam"
      name: "垃圾邮件"
      priority: "low"
    # Steam游戏相关分类
    - code: "steam_promotion"
      name: "Steam促销"
      priority: "medium"
      auto_extract: true  # 分类后自动触发Steam信息提取
    - code: "steam_wishlist"
      name: "Steam愿望单"
      priority: "medium"
      auto_extract: true
    - code: "steam_news"
      name: "Steam资讯"
      priority: "low"
      auto_extract: true
    - code: "steam_update"
      name: "Steam更新"
      priority: "low"
      auto_extract: false

# 提取配置
extraction:
  extract_actions: true
  extract_meetings: true
  extract_deadlines: true
  extract_entities: true

# 日志配置
logging:
  level: "INFO"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {message}"