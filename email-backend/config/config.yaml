server:
  port: 8080
  mode: debug
  read_timeout: 30s
  write_timeout: 30s

database:
  host: localhost
  port: 3306
  username: root
  password: 123456
  dbname: email_agent
  max_open_conns: 100
  max_idle_conns: 10

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0

agent:
  url: http://localhost:9111
  api_key: ""
  timeout: 60

email:
  sync_interval: 5
  batch_size: 50
  initial_days: 30
  auto_classify: true

security:
  credential_key: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
  jwt_secret: "your_jwt_secret_key_here"
