# 服务端配置
server:
  port: 8080
  mode: debug  # debug, release

# 数据库配置
database:
  host: localhost
  port: 3306
  username: root
  password: ${DB_PASSWORD}
  dbname: email_system
  max_open_conns: 100
  max_idle_conns: 10

# Redis配置
redis:
  host: localhost
  port: 6379
  password: ""
  db: 0

# Agent配置
agent:
  url: http://localhost:8001
  api_key: ${AGENT_API_KEY}
  timeout: 60

# 邮件配置
email:
  sync_interval: 5    # 同步间隔(分钟)
  batch_size: 50      # 单次拉取数量
  initial_days: 30    # 首次同步天数
  auto_classify: true # 是否自动分类

# 安全配置
security:
  credential_key: ${CREDENTIAL_KEY}
  jwt_secret: ${JWT_SECRET}